services:
  # Serviço principal do Laravel + Octane + FrankenPHP
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wild_rift_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_DATABASE=wild_rift
      - DB_USERNAME=root
      - DB_PASSWORD=kiraFE22
      - OCTANE_WATCH=true
    depends_on:
      db:
        condition: service_healthy

  # Banco de dados MySQL rodando em container
  db:
    image: mysql:8.0
    container_name: wild_rift_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=wild_rift
      - MYSQL_ROOT_PASSWORD=kiraFE22
      - MYSQL_ROOT_HOST=%
    volumes:
      - wild_rift_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      timeout: 5s
      retries: 10
      interval: 10s
      start_period: 60s

volumes:
  wild_rift_db_data:
    driver: local
