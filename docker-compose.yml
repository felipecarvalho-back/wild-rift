services:
  # Serviço principal do Laravel + Octane + FrankenPHP
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wild_rift_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_DATABASE=wild_rift
      - DB_USERNAME=root
      - DB_PASSWORD=kiraFE22
      - OCTANE_WATCH=true
    depends_on:
      db:
        condition: service_healthy

  # Banco de dados MySQL rodando em container
  db:
    image: mysql:8.0
    container_name: wild_rift_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=wild_rift
      - MYSQL_ROOT_PASSWORD=kiraFE22
    volumes:
      - wild_rift_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      timeout: 5s
      retries: 5
      interval: 5s

volumes:
  wild_rift_db_data:
    driver: local
